<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialForge AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #08080e;
      --surface:     #111118;
      --border:      #1e1e2e;
      --text:        #f0f0f5;
      --muted:       #6b6b80;
      --accent:      #4f8ef7;
      --fb:   #1877F2;
      --ig:   #E1306C;
      --li:   #0A66C2;
      --tt:   #ffffff;
      --vis:  #7c3aed;
      --radius: 12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    header h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto;
    }

    .demo-banner {
      background: #1a120a;
      border: 1px solid #3d2b0a;
      color: #f59e0b;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 28px;
      text-align: center;
      display: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    label .req { color: var(--accent); margin-left: 2px; }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
      width: 100%;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    select option { background: #1a1a2e; }

    .btn-generate {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-generate:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #loading {
      display: none;
      text-align: center;
      padding: 48px 0;
    }

    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }

    .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

    #results {
      display: none;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .platform-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .platform-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
    }

    .dot-fb { background: var(--fb); }
    .dot-ig { background: var(--ig); }
    .dot-li { background: var(--li); }
    .dot-tt { background: var(--tt); }
    .dot-vis { background: var(--vis); }

    .platform-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .platform-body { padding: 20px; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .content-section { margin-bottom: 20px; }
    .content-section:last-child { margin-bottom: 0; }

    .content-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .content-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }

    .image-preview {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
    }

    .image-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

    .btn-sm {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-sm:hover { opacity: 0.8; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-solid {
      background: var(--vis);
      border: 1px solid transparent;
      color: #fff;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>

<body>
<div class="wrapper">

  <header>
    <div class="badge">AI-POWERED · n8n AUTOMATION</div>
    <h1>Social<span>Forge</span> AI</h1>
    <p>Δώσε ένα θέμα. Πάρε έτοιμο content για κάθε πλατφόρμα.</p>
  </header>

  <div class="demo-banner" id="demoBanner">
    ⚡ Demo Mode — Προβολή mock δεδομένων. Για live χρήση απαιτείται το n8n να τρέχει locally.
  </div>

  <div class="card">
    <div class="card-title">— Input</div>

    <div class="form-grid">

      <div class="field full">
        <label for="topic">Θέμα / Προϊόν <span class="req">*</span></label>
        <input type="text" id="topic" placeholder="π.χ. Optilis Ireks — βελτιωτικό αρτοποιίας Laoudis" />
      </div>

      <div class="field full">
        <label for="productUrl">URL Προϊόντος <span style="color:var(--muted)">(προαιρετικό)</span></label>
        <input type="url" id="productUrl" placeholder="https://www.laoudis.gr/products/optilis-ireks" />
      </div>

      <div class="field">
        <label for="tone">Tone of Voice <span class="req">*</span></label>
        <select id="tone">
          <option value="">— Επίλεξε —</option>
          <option value="Professional">Professional</option>
          <option value="Friendly & Warm">Friendly & Warm</option>
          <option value="Bold & Energetic">Bold & Energetic</option>
          <option value="Educational">Educational</option>
        </select>
      </div>

      <div class="field">
        <label for="style">Visual Style <span class="req">*</span></label>
        <select id="style">
          <option value="">— Επίλεξε —</option>
          <option value="Photorealistic">Photorealistic</option>
          <option value="Minimalist">Minimalist</option>
          <option value="Bold & Colorful">Bold & Colorful</option>
          <option value="Dark & Premium">Dark & Premium</option>
        </select>
      </div>

      <div class="field full">
        <label for="email">Αποστολή στο Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="yourname@email.com" />
      </div>

    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      ⚡ Generate Content
    </button>
  </div>

  <div id="loading">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text" id="loadingText">Αναλύω το προϊόν...</div>
  </div>

  <div id="results"></div>

</div>

<script>
/*
========================================================
CONFIGURATION
Για live testing με ngrok αλλάζεις μόνο αυτή τη γραμμή:

Για τοπικό testing (index.html με διπλό κλικ) αφήνεις:
cconst WEBHOOK_URL = 'http://localhost:5678/webhook-test/socialforge';
========================================================
*/
const WEBHOOK_URL = 'http://localhost:5678/webhook-test/socialforge';

const LOADING_MSGS = [
  'Αναλύω το προϊόν...',
  'Κάνω research στο internet...',
  'Γράφω copy για Facebook...',
  'Βελτιστοποιώ για Instagram...',
  'Δημιουργώ TikTok hook...',
  'Χτίζω το LinkedIn post...',
  'Παράγω εικόνα...',
  'Τελικές πινελιές...'
];

const MOCK = {
  facebook_a_title: 'Το μυστικό του τέλειου ψωμιού',
  facebook_a_hook: '🍞 Γιατί το ψωμί σου κολλάει στο ψυγείο; Και γιατί αυτοί που ξέρουν, δεν σου το λένε.',
  facebook_a_body: '📌 Η αργή ζύμωση (12-72 ώρες) είναι η τεχνική που χρησιμοποιούν οι καλύτεροι αρτοποιοί.\n\n✔️ Πιο πλούσια γεύση\n✔️ Τραγανή κόρα που κρατάει\n✔️ Ομοιόμορφο αποτέλεσμα κάθε φορά\n\nΤο Optilis Ireks είναι ο καταλύτης που εξαλείφει τα λάθη και σου δίνει τον έλεγχο.',
  facebook_a_cta: 'Γράψε μας για δωρεάν δείγμα →',
  facebook_a_hashtags: '#αρτοποιία #ψωμί #laoudisfoods #βελτιωτικό #αρτοποιός #slowfermentation #breadmaking',
  facebook_b_title: 'Αποτελέσματα που μιλούν μόνα τους',
  facebook_b_hook: '✨ Φανταστείτε κάθε καρβέλι να βγαίνει τέλειο. Όχι τυχαία — συστηματικά.',
  facebook_b_body: '🎯 Λιγότερα reject προϊόντα\n🎯 Εξοικονόμηση κόστους υλικών\n🎯 Ευχαριστημένοι πελάτες που επιστρέφουν\n\nΤο Optilis Ireks ελέγχει τη ζύμωση, σταματά τα ανεπιθύμητα φουσκαλάκια και εγγυάται λεία, γυαλιστερή κόρα.',
  facebook_b_cta: 'Δες το προϊόν στο laoudis.gr',
  facebook_b_hashtags: '#laoudisfoods #breadimprover #αρτοποιία #ποιότητα #επαγγελματίας',
  instagram_hook: '🍞 Το βελτιωτικό που αλλάζει τα πάντα στην αργή ζύμωση.',
  instagram_body: 'Ξέρεις εκείνη τη στιγμή που ανοίγεις τον φούρνο και το αποτέλεσμα... δεν είναι αυτό που περίμενες;\n\nΤο Optilis Ireks by Laoudis Foods λύνει ακριβώς αυτό:\n\n▸ Ελέγχει τη ζύμωση σε ψυγείο 12-72 ώρες\n▸ Εξαλείφει ανεπιθύμητα φουσκαλάκια\n▸ Εγγυάται τραγανή, γυαλιστερή κόρα\n\nΑποτέλεσμα; Κάθε καρβέλι σαν να βγήκε από επαγγελματικό αρτοποιείο.',
  instagram_save: 'Αποθήκευσε το post για να το δείξεις στο αρτοποιείο σου',
  instagram_cta: '🔗 Link in bio για δείγμα',
  instagram_hashtags: '#αρτοποιία #ψωμί #laoudisfoods #breadmaking #artisanbread',
  instagram_keywords: 'βελτιωτικό αρτοποιίας, αργή ζύμωση, επαγγελματικό ψωμί',
  linkedin_hook: 'Η αργή ζύμωση δεν είναι απλώς τάση. Είναι η επόμενη πρόκληση για επαγγελματίες αρτοποιούς.',
  linkedin_body: 'Το 73% των αρτοποιείων που υιοθέτησαν slow fermentation αναφέρει αύξηση στην επαναλαμβανόμενη αγορά.\n\nΗ πρόκληση; Η ελεγχόμενη ζύμωση σε ψυγείο απαιτεί ακρίβεια που δεν συγχωρεί λάθη.\n\nΤο Optilis Ireks by Laoudis Foods σχεδιάστηκε για αυτό ακριβώς το πρόβλημα:\n→ Συμμετοχή μόλις 0.5%\n→ Αποτρέπει υπερβολική ζύμωση\n→ Σταθερά αποτελέσματα σε κάθε παρτίδα\n\nΑν δουλεύεις με slow fermentation, αξίζει να το δοκιμάσεις.',
  linkedin_comment: 'Δουλεύετε με αργή ζύμωση στο αρτοποιείο σας; Ποια είναι η μεγαλύτερη πρόκληση που αντιμετωπίζετε;',
  linkedin_cta: 'Ακολουθήστε για περισσότερα',
  linkedin_hashtags: '#bakery #foodindustry #laoudisfoods #artisanbread',
  tiktok_hook: '"Γιατί το ψωμί σου από το ψυγείο δεν γίνεται ποτέ σωστό;" — Δες τη λύση.',
  tiktok_script: '1. HOOK (0-3s): Κοντινό πλάνο σε ψωμί με ατέλειες\n2. PROBLEM (3-8s): Εξήγηση τι πάει στραβά στην αργή ζύμωση\n3. SOLUTION (8-15s): Παρουσίαση Optilis Ireks\n4. RESULT (15-25s): Time-lapse του τέλειου αποτελέσματος\n5. CTA (25-30s): "Σχολίασε ΖΥΜΗ για να μάθεις περισσότερα"',
  tiktok_overlay: '"Το μυστικό;" → "0.5% στη ζύμη" → "Τέλειο αποτέλεσμα κάθε φορά"',
  tiktok_hashtags: '#αρτοποιία #ψωμί #laoudis #breadtok #slowfermentation',
  imageUrl: 'https://image.pollinations.ai/prompt/professional%20artisan%20bread%20loaf%2C%20golden%20crust%2C%20dark%20moody%20bakery%20background%2C%20minimalist%20composition%2C%2040%25%20negative%20space%20left%2C%20no%20text%2C%20cinematic%20lighting?width=1024&height=1024&nologo=true',
  svgHeadline: 'Τέλεια Κόρα. Κάθε Φορά.',
  svgCta: 'ΜΑΘΕ ΠΕΡΙΣΣΟΤΕΡΑ'
};

let loadingInterval = null;

async function generate() {
  const topic  = document.getElementById('topic').value.trim();
  const url    = document.getElementById('productUrl').value.trim();
  const tone   = document.getElementById('tone').value;
  const style  = document.getElementById('style').value;
  const email  = document.getElementById('email').value.trim();

  if (!topic || !tone || !style || !email) {
    alert('Παρακαλώ συμπλήρωσε όλα τα υποχρεωτικά πεδία.');
    return;
  }

  document.querySelector('.card').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('generateBtn').disabled = true;

  let msgIndex = 0;
  document.getElementById('loadingText').textContent = LOADING_MSGS[msgIndex];
  loadingInterval = setInterval(() => {
    msgIndex = (msgIndex + 1) % LOADING_MSGS.length;
    document.getElementById('loadingText').textContent = LOADING_MSGS[msgIndex];
  }, 2500);

  const payload = {
    "Τίτλος Προϊόντος ή Θέμα / Product title or Theme": topic,
    "Tone of Voice (Mood) / Τόνος ": tone,
    "Στυλ / Visual Style": style,
    "Αποστολή στο Email": email,
    "topic": topic,
    "productUrl": url
  };

  let data = null;
  let isDemo = false;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);

    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    clearTimeout(timeout);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();
    data = result.ai_response;
    data = await response.json();

  } catch (err) {
    console.warn('n8n unreachable, using demo data:', err.message);
    data = MOCK;
    isDemo = true;
  }

  clearInterval(loadingInterval);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('demoBanner').style.display = isDemo ? 'block' : 'none';

  renderResults(data);
}

  container.innerHTML = `

      <div class="platform-header" onclick="toggleCard('ig-body')">

        </div>

    <div class="platform-card">
      <div class="platform-header" onclick="toggleCard('li-body')">
        <div class="platform-label">
          <div class="platform-dot dot-li"></div>
          💼 LinkedIn
        </div>
        <span style="color:var(--muted);font-size:12px">▾</span>
      </div>
      <div class="platform-body" id="li-body">
        ${contentBlock('Hook', d.linkedin_hook)}
        ${contentBlock('Body', d.linkedin_body)}
        ${contentBlock('CTA', d.linkedin_cta)}
        ${contentBlock('First Comment', d.linkedin_comment)}
        ${contentBlock('Hashtags', d.linkedin_hashtags)}
      </div>
    </div>

    <div class="platform-card">
      <div class="platform-header" onclick="toggleCard('tt-body')">
        <div class="platform-label">
          <div class="platform-dot dot-tt"></div>
          🎵 TikTok
        </div>
        <span style="color:var(--muted);font-size:12px">▾</span>
      </div>
      <div class="platform-body" id="tt-body">
        ${contentBlock('Retention Hook (1-3 sec)', d.tiktok_hook)}
        ${contentBlock('Script Outline', d.tiktok_script)}
        ${contentBlock('Text Overlay', d.tiktok_overlay)}
        ${contentBlock('Hashtags', d.tiktok_hashtags)}
      </div>
    </div>

    <div class="platform-card">
      <div class="platform-header" onclick="toggleCard('vis-body')">
        <div class="platform-label">
          <div class="platform-dot dot-vis"></div>
          🎨 Visual
        </div>
        <span style="color:var(--muted);font-size:12px">▾</span>
      </div>
      <div class="platform-body" id="vis-body">
        ${d.imageUrl ? `<img class="image-preview" src="${d.imageUrl}" alt="Generated visual" loading="lazy" />` : ''}
        ${contentBlock('SVG Headline', d.svgHeadline || '—')}
        ${contentBlock('CTA', d.svgCta || '—')}
        ${d.imageUrl ? `
        <div class="image-actions">
          <a href="${d.imageUrl}" target="_blank" class="btn-sm btn-outline">🔗 Άνοιγμα εικόνας</a>
          <a href="${d.imageUrl}" download="socialforge-image.jpg" class="btn-sm btn-solid">⬇ Download</a>
        </div>` : ''}
      </div>
    </div>

    <button class="btn-generate" onclick="reset()" style="margin-top:8px;background:transparent;border:1px solid var(--border);color:var(--muted)">
      ← Νέο Generate
    </button>
  `;

  container.style.display = 'block';
}

function contentBlock(label, text) {
  if (!text) return '';
  const id = 'cb_' + Math.random().toString(36).substr(2,6);
  return `
    <div class="content-section">
      <div class="content-label">${label}</div>
      <div class="content-text" id="${id}">${text}</div>
      <button class="copy-btn" onclick="copyText('${id}', this)">Copy</button>
    </div>
  `;
}

function copyText(id, btn) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(err => {
    console.error('Σφάλμα αντιγραφής:', err);
  });
}

function toggleCard(id) {
  const el = document.getElementById(id);
  el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

/*
FIX (Gemini): Η switchTab() τώρα βρίσκει την κάρτα
μέσω id="${platform}-card" και αλλάζει μόνο τα tabs
και panes ΜΕΣΑ σε αυτή. Η παλιά έκδοση χρησιμοποιούσε
event.target που έδινε λάθος αποτέλεσμα.
*/
function switchTab(platform, tabName) {
  const card = document.getElementById(`${platform}-card`);
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  const tabs = card.querySelectorAll('.tab');
  if (tabName === 'a') {
    tabs[0].classList.add('active');
    document.getElementById(`${platform}-a`).classList.add('active');
  } else {
    tabs[1].classList.add('active');
    document.getElementById(`${platform}-b`).classList.add('active');
  }
}

function reset() {
  document.querySelector('.card').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('demoBanner').style.display = 'none';
}
</script>
</body>
</html>
