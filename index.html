
<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialForge AI</title>

  <!--
    ========================================================
    FONTS
    Syne: geometric display font για headers — δίνει
    το "tech tool" feeling χωρίς να είναι cliché.
    DM Sans: modern humanist sans για body text —
    εξαιρετικά readable, λιγότερο generic από Inter.
    ========================================================
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /*
    ========================================================
    CSS VARIABLES — Design System
    Όλα τα χρώματα σε ένα σημείο. Έτσι αν θέλεις να
    αλλάξεις το brand color, αλλάζεις μόνο εδώ.
    ========================================================
    */
    :root {
      --bg:          #08080e;
      --surface:     #111118;
      --border:      #1e1e2e;
      --text:        #f0f0f5;
      --muted:       #6b6b80;
      --accent:      #4f8ef7;

      /* Platform colors — χρησιμοποιούνται στα cards */
      --fb:   #1877F2;
      --ig:   #E1306C;
      --li:   #0A66C2;
      --tt:   #ffffff;
      --vis:  #7c3aed;

      --radius: 12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    /*
    ========================================================
    RESET & BASE
    box-sizing: border-box σε όλα — αποφεύγει
    υπολογισμούς με padding/width.
    ========================================================
    */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /*
    ========================================================
    GRAIN OVERLAY
    Ένα subtle noise texture πάνω από το background.
    Δίνει depth και αποφεύγει το "flat" AI look.
    Χρησιμοποιεί SVG filter με feTurbulence.
    ========================================================
    */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /*
    ========================================================
    LAYOUT WRAPPER
    max-width: 760px — αρκετά φαρδύ για content,
    αρκετά στενό για readability. Centered με auto margins.
    ========================================================
    */
    .wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /*
    ========================================================
    HEADER
    Το logo/tagline section. Το badge "AI-POWERED"
    δίνει instant context για portfolio viewers.
    ========================================================
    */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 20px;
    }

    header h1 {
      font-family: var(--font-head);
      font-size: clamp(2rem, 6vw, 3.2rem); /* clamp = responsive χωρίς media queries */
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--muted);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto;
    }

    /*
    ========================================================
    DEMO BANNER
    Εμφανίζεται όταν το n8n δεν τρέχει.
    Ενημερώνει τον portfolio viewer χωρίς να σπάει το UX.
    ========================================================
    */
    .demo-banner {
      background: #1a120a;
      border: 1px solid #3d2b0a;
      color: #f59e0b;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 28px;
      text-align: center;
      display: none; /* εμφανίζεται μόνο σε demo mode μέσω JS */
    }

    /*
    ========================================================
    FORM CARD
    Το κεντρικό input panel. Surface color (#111118)
    διαφοροποιείται ελαφρά από το background.
    Border με λεπτή γραμμή για definition.
    ========================================================
    */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /*
    ========================================================
    FORM ELEMENTS
    Label πάνω, input κάτω — πιο accessible από placeholders.
    Gap: 20px μεταξύ fields για breathing room.
    ========================================================
    */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 2 columns στο desktop */
      gap: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; } /* full width field */

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* required star */
    label .req { color: var(--accent); margin-left: 2px; }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
      width: 100%;
      outline: none;
    }

    /* Focus state — accessibility + aesthetic */
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
    }

    select option { background: #1a1a2e; }

    /*
    ========================================================
    SUBMIT BUTTON
    Full-width, solid accent color. Transform on hover
    για tactile feel. Disabled state κατά το loading.
    ========================================================
    */
    .btn-generate {
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn-generate:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /*
    ========================================================
    LOADING STATE
    3 animated dots — CSS keyframe animation.
    Κάθε dot έχει animation-delay για "wave" effect.
    ========================================================
    */
    #loading {
      display: none;
      text-align: center;
      padding: 48px 0;
    }

    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }

    .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

    /*
    ========================================================
    RESULTS SECTION
    Κρυφό αρχικά, εμφανίζεται μετά το API call.
    Fade-in animation για smooth reveal.
    ========================================================
    */
    #results {
      display: none;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /*
    ========================================================
    PLATFORM CARDS
    Κάθε πλατφόρμα έχει το brand color της ως
    left border (4px). Subtle top gradient για depth.
    ========================================================
    */
    .platform-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .platform-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; /* collapsible */
      user-select: none;
    }

    .platform-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
    }

    /* Το χρωματιστό dot δίπλα στο όνομα πλατφόρμας */
    .dot-fb { background: var(--fb); }
    .dot-ig { background: var(--ig); }
    .dot-li { background: var(--li); }
    .dot-tt { background: var(--tt); }
    .dot-vis { background: var(--vis); }

    .platform-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .platform-body { padding: 20px; }

    /*
    ========================================================
    VARIATION TABS
    Για το Facebook A/B — tab navigation.
    Active tab έχει accent underline.
    ========================================================
    */
    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /*
    ========================================================
    CONTENT BLOCKS
    Κάθε section μέσα στο platform card (hook, body κλπ)
    έχει label + content. Copy button εμφανίζεται on hover.
    ========================================================
    */
    .content-section { margin-bottom: 20px; }
    .content-section:last-child { margin-bottom: 0; }

    .content-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .content-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap; /* διατηρεί line breaks από το AI */
      word-break: break-word;
    }

    /*
    ========================================================
    COPY BUTTON
    Εμφανίζεται πάντα (όχι μόνο hover) για mobile-friendly.
    Μικρό, discrete, αλλάζει σε "Copied!" για feedback.
    ========================================================
    */
    .copy-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }

    /*
    ========================================================
    IMAGE SECTION
    Η εικόνα φορτώνει lazy (loading="lazy").
    Skeleton placeholder ενώ φορτώνει.
    ========================================================
    */
    .image-preview {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
    }

    .image-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

    .btn-sm {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-sm:hover { opacity: 0.8; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-solid {
      background: var(--vis);
      border: 1px solid transparent;
      color: #fff;
    }

    /*
    ========================================================
    RESPONSIVE
    Στο mobile: 1 column grid, μικρότερο padding
    ========================================================
    */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>

<body>
<div class="wrapper">

  <!-- ========================================================
    HEADER SECTION
    Το brand identity της εφαρμογής.
    Το <span> βάζει accent color στη λέξη "AI".
  ======================================================== -->
  <header>
    <div class="badge">AI-POWERED · n8n AUTOMATION</div>
    <h1>Social<span>Forge</span> AI</h1>
    <p>Δώσε ένα θέμα. Πάρε έτοιμο content για κάθε πλατφόρμα.</p>
  </header>

  <!-- Demo banner — κρυφό αρχικά, εμφανίζεται από JS -->
  <div class="demo-banner" id="demoBanner">
    ⚡ Demo Mode — Προβολή mock δεδομένων. Για live χρήση απαιτείται το n8n να τρέχει locally.
  </div>

  <!-- ========================================================
    INPUT FORM CARD
    5 fields:
    1. Τίτλος/Θέμα (required) — το κυρίαρχο input
    2. URL (optional) — για product pages
    3. Tone of Voice (select) — 4 επιλογές
    4. Visual Style (select) — 4 επιλογές  
    5. Email (required) — για αποστολή αποτελεσμάτων

    ΤΑ FIELD NAMES στο JS πρέπει να ταιριάζουν ΑΚΡΙΒΩΣ
    με αυτά που περιμένει το n8n webhook.
  ======================================================== -->
  <div class="card">
    <div class="card-title">— Input</div>

    <div class="form-grid">

      <div class="field full">
        <label for="topic">Θέμα / Προϊόν <span class="req">*</span></label>
        <input type="text" id="topic" placeholder="π.χ. Optilis Ireks — βελτιωτικό αρτοποιίας Laoudis" />
      </div>

      <div class="field full">
        <label for="productUrl">URL Προϊόντος <span style="color:var(--muted)">(προαιρετικό)</span></label>
        <input type="url" id="productUrl" placeholder="https://www.laoudis.gr/products/optilis-ireks" />
      </div>

      <div class="field">
        <label for="tone">Tone of Voice <span class="req">*</span></label>
        <select id="tone">
          <option value="">— Επίλεξε —</option>
          <option value="Professional">Professional</option>
          <option value="Friendly & Warm">Friendly & Warm</option>
          <option value="Bold & Energetic">Bold & Energetic</option>
          <option value="Educational">Educational</option>
        </select>
      </div>

      <div class="field">
        <label for="style">Visual Style <span class="req">*</span></label>
        <select id="style">
          <option value="">— Επίλεξε —</option>
          <option value="Photorealistic">Photorealistic</option>
          <option value="Minimalist">Minimalist</option>
          <option value="Bold & Colorful">Bold & Colorful</option>
          <option value="Dark & Premium">Dark & Premium</option>
        </select>
      </div>

      <div class="field full">
        <label for="email">Αποστολή στο Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="yourname@email.com" />
      </div>

    </div>

    <button class="btn-generate" id="generateBtn" onclick="generate()">
      ⚡ Generate Content
    </button>
  </div>

  <!-- ========================================================
    LOADING STATE
    Εμφανίζεται μόνο κατά την κλήση του webhook.
    Τα 3 dots έχουν staggered animation για wave effect.
    Το loading-text αλλάζει κάθε 2 δευτερόλεπτα μέσω JS.
  ======================================================== -->
  <div id="loading">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text" id="loadingText">Αναλύω το προϊόν...</div>
  </div>

  <!-- ========================================================
    RESULTS SECTION
    Γεμίζει δυναμικά από JS μετά το API response.
    Αρχικά hidden (display:none).
  ======================================================== -->
  <div id="results"></div>

</div><!-- /wrapper -->

<script>
/*
========================================================

το n8n σε server ή αλλάξει port.
========================================================
*/

/*
========================================================
STATE VARIABLES
Ο "κινητήρας" της εφαρμογής.
loadingInterval: κρατάει το ID του setInterval
ώστε να μπορούμε να το σταματήσουμε μετά.
========================================================
*/
let loadingInterval = null;

/*
========================================================
GENERATE FUNCTION
Καλείται όταν ο χρήστης πατάει το κουμπί.

Βήματα:
1. Validation — έλεγχος required fields
2. UI transition — form → loading state
3. fetch() POST στο webhook
4. Error handling — fallback σε demo mode
5. renderResults() — γεμίζει το DOM με τα δεδομένα
========================================================
*/
async function generate() {
  // 1. COLLECT FORM VALUES
  const topic    = document.getElementById('topic').value.trim();
  const url      = document.getElementById('productUrl').value.trim();
  const tone     = document.getElementById('tone').value;
  const style    = document.getElementById('style').value;
  const email    = document.getElementById('email').value.trim();

  // 2. VALIDATION
  if (!topic || !tone || !style || !email) {
    alert('Παρακαλώ συμπλήρωσε όλα τα υποχρεωτικά πεδία.');
    return;
  }

  // 3. UI: Show loading, hide form & results
  document.querySelector('.card').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('generateBtn').disabled = true;

  // 4. ROTATE LOADING MESSAGES every 2.5 seconds
  let msgIndex = 0;
  loadingInterval = setInterval(() => {
    msgIndex = (msgIndex + 1) % LOADING_MSGS.length;
    document.getElementById('loadingText').textContent = LOADING_MSGS[msgIndex];
  }, 2500);

  /*
  ----------------------------------------------------------
  PAYLOAD STRUCTURE
  Πρέπει να ταιριάζει ΑΚΡΙΒΩΣ με τα field names
  που χρησιμοποιεί το n8n workflow:
  - "Τίτλος Προϊόντος..." → Market Research + Copywrite prompts
  - "Tone of Voice..."    → Copywrite prompt
  - "Στυλ..."             → Copywrite prompt
  - "Αποστολή στο Email" → Gmail node To field
  - "topic"               → Google Search query ($json["topic"])
  - "productUrl"          → HTTP Request URL ($json["productUrl"])
  ----------------------------------------------------------
  */
  const payload = {
    "Τίτλος Προϊόντος ή Θέμα / Product title or Theme": topic,
    "Tone of Voice (Mood) / Τόνος ": tone,
    "Στυλ / Visual Style": style,
    "Αποστολή στο Email": email,
    "topic": topic,      // για το Google Search node
    "productUrl": url    // για το HTTP Request node
  };

  let data = null;
  let isDemo = false;

  try {
    // 5. FETCH CALL — POST to n8n webhook
    // timeout: 120 δευτερόλεπτα (το workflow μπορεί να πάρει χρόνο)
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);

    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    data = await response.json();

  } catch (err) {
    /*
    6. ERROR HANDLING — Demo Fallback
    Αν το fetch αποτύχει (n8n offline, CORS, timeout),
    χρησιμοποιούμε τα mock δεδομένα και δείχνουμε banner.
    */
    console.warn('n8n unreachable, using demo data:', err.message);
    data = MOCK;
    isDemo = true;
  }

  // 7. STOP LOADING, SHOW RESULTS
  clearInterval(loadingInterval);
  document.getElementById('loading').style.display = 'none';

  if (isDemo) {
    document.getElementById('demoBanner').style.display = 'block';
  }

  renderResults(data);
}

/*
========================================================
RENDER RESULTS FUNCTION
Δέχεται το JSON από το n8n (ή το MOCK)
και χτίζει δυναμικά το DOM.

Χρησιμοποιεί template literals για κάθε platform card.
Κάθε card έχει platform color, tabs (όπου χρειάζεται),

/*
========================================================
HELPER: contentBlock()
Δημιουργεί ένα label + text + copy button block.
Κληρώνεται για κάθε section μέσα στα platform cards.
Η unique ID βασίζεται στο timestamp για αποφυγή conflicts.
========================================================
*/
function contentBlock(label, text) {
  if (!text) return '';
  const id = 'cb_' + Math.random().toString(36).substr(2,6);
  return `
    <div class="content-section">
      <div class="content-label">${label}</div>
      <div class="content-text" id="${id}">${text}</div>
      <button class="copy-btn" onclick="copyText('${id}', this)">Copy</button>
    </div>
  `;
}

/*
========================================================
HELPER: copyText()
Χρησιμοποιεί το Clipboard API για copy.
Αλλάζει το button σε "Copied!" για visual feedback.
========================================================
*/
function copyText(id, btn) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  });
}

/*
========================================================
HELPER: toggleCard()
Collapsible cards — κάνει show/hide το platform body.
Βελτιώνει usability όταν υπάρχουν πολλά αποτελέσματα.
========================================================
*/
function toggleCard(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : '';
}

/*
========================================================
HELPER: switchTab()
Για τα Facebook A/B tabs.
Αλλάζει active class και εμφανίζει/κρύβει panes.
========================================================
*/
function switchTab(platform, variant) {
  document.querySelectorAll(`#${platform}-a, #${platform}-b`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.closest(`[id^="${platform}"]`) || t.parentElement.parentElement.id === `${platform}-body`) {
      t.classList.remove('active');
    }
  });
  document.getElementById(`${platform}-${variant}`).classList.add('active');
  event.target.classList.add('active');
}

/*
========================================================
RESET FUNCTION
Επιστρέφει στην αρχική κατάσταση.
========================================================
*/
function reset() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('demoBanner').style.display = 'none';
  document.querySelector('.card').style.display = 'block';
  document.getElementById('generateBtn').disabled = false;
}
</script>
