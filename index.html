
<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SocialForge AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #08080e;
      --surface:  #111118;
      --border:   #1e1e2e;
      --text:     #f0f0f5;
      --muted:    #6b6b80;
      --accent:   #4f8ef7;
      --fb:   #1877F2;
      --ig:   #E1306C;
      --li:   #0A66C2;
      --tt:   #ffffff;
      --vis:  #7c3aed;
      --radius: 12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }

    header { text-align: center; margin-bottom: 48px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 100px; margin-bottom: 20px; }
    header h1 { font-family: var(--font-head); font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 12px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); font-size: 15px; max-width: 420px; margin: 0 auto; }

    .demo-banner { background: #1a120a; border: 1px solid #3d2b0a; color: #f59e0b; font-size: 13px; padding: 10px 16px; border-radius: 8px; margin-bottom: 28px; text-align: center; display: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; }
    .card-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.5px; }
    label .req { color: var(--accent); margin-left: 2px; }
    input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 10px 14px; transition: border-color 0.2s; width: 100%; outline: none; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    
    .btn-generate { width: 100%; margin-top: 28px; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s, opacity 0.15s; }
    .btn-generate:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #loading { display: none; text-align: center; padding: 48px 0; }
    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    #results { display: none; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .platform-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    .platform-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .platform-label { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-size: 14px; font-weight: 700; }
    .platform-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-fb { background: var(--fb); } .dot-ig { background: var(--ig); } .dot-li { background: var(--li); } .dot-tt { background: var(--tt); } .dot-vis { background: var(--vis); }
    .platform-body { padding: 20px; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .content-section { margin-bottom: 20px; }
    .content-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .content-text { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .copy-btn { margin-top: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }

    .image-preview { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; background: var(--border); }
    .image-actions { display: flex; gap: 10px; margin-top: 12px; }
    .btn-sm { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-solid { background: var(--vis); border: 1px solid transparent; color: #fff; }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .card { padding: 20px; } }
  </style>
</head>

<body>
<div class="wrapper">
  <header>
    <div class="badge">AI-POWERED · n8n AUTOMATION</div>
    <h1>Social<span>Forge</span> AI</h1>
    <p>Δώσε ένα θέμα. Πάρε έτοιμο content για κάθε πλατφόρμα.</p>
  </header>

  <div class="demo-banner" id="demoBanner">
    ⚡ Demo Mode — Προβολή mock δεδομένων.
  </div>

  <div class="card">
    <div class="card-title">— Input</div>
    <div class="form-grid">
      <div class="field full">
        <label for="topic">Θέμα / Προϊόν <span class="req">*</span></label>
        <input type="text" id="topic" placeholder="π.χ. Optilis Ireks" />
      </div>
      <div class="field full">
        <label for="productUrl">URL Προϊόντος <span style="color:var(--muted)">(προαιρετικό)</span></label>
        <input type="url" id="productUrl" />
      </div>
      <div class="field">
        <label for="tone">Tone of Voice <span class="req">*</span></label>
        <select id="tone">
          <option value="">— Επίλεξε —</option>
          <option value="Professional">Professional</option>
          <option value="Friendly & Warm">Friendly & Warm</option>
          <option value="Bold & Energetic">Bold & Energetic</option>
          <option value="Educational">Educational</option>
        </select>
      </div>
      <div class="field">
        <label for="style">Visual Style <span class="req">*</span></label>
        <select id="style">
          <option value="">— Επίλεξε —</option>
          <option value="Photorealistic">Photorealistic</option>
          <option value="Minimalist">Minimalist</option>
          <option value="Bold & Colorful">Bold & Colorful</option>
          <option value="Dark & Premium">Dark & Premium</option>
        </select>
      </div>
      <div class="field full">
        <label for="email">Αποστολή στο Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="yourname@email.com" />
      </div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generate()">⚡ Generate Content</button>
  </div>

  <div id="loading">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="loading-text" id="loadingText">Αναλύω το προϊόν...</div>
  </div>

  <div id="results"></div>
</div>

<script>
/* CONFIGURATION */
const WEBHOOK_URL = 'http://localhost:5678/webhook/socialforge';

const LOADING_MSGS = [
  'Αναλύω το προϊόν...', 'Κάνω research...', 'Γράφω Facebook...', 'Βελτιστοποιώ Instagram...',
  'Δημιουργώ TikTok hook...', 'Χτίζω LinkedIn post...', 'Παράγω εικόνα...', 'Τελικές πινελιές...'
];

const MOCK = {
  facebook_a_title: 'Το μυστικό του τέλειου ψωμιού',
  facebook_a_hook: '🍞 Γιατί το ψωμί σου κολλάει στο ψυγείο; Και γιατί αυτοί που ξέρουν, δεν σου το λένε.',
  facebook_a_body: '📌 Η αργή ζύμωση (12-72 ώρες) είναι η τεχνική που χρησιμοποιούν οι καλύτεροι αρτοποιοί.\n\n✔️ Πιο πλούσια γεύση\n✔️ Τραγανή κόρα\n✔️ Ομοιόμορφο αποτέλεσμα.',
  facebook_a_cta: 'Γράψε μας για δωρεάν δείγμα →',
  facebook_a_hashtags: '#αρτοποιία #ψωμί #laoudisfoods',
  facebook_b_title: 'Αποτελέσματα που μιλούν μόνα τους',
  facebook_b_hook: '✨ Φανταστείτε κάθε καρβέλι να βγαίνει τέλειο. Όχι τυχαία.',
  facebook_b_body: '🎯 Λιγότερα reject προϊόντα\n🎯 Εξοικονόμηση κόστους υλικών\n🎯 Ευχαριστημένοι πελάτες.',
  facebook_b_cta: 'Δες το προϊόν στο laoudis.gr',
  facebook_b_hashtags: '#laoudisfoods #breadimprover',
  instagram_hook: '🍞 Το βελτιωτικό που αλλάζει τα πάντα στην αργή ζύμωση.',
  instagram_body: 'Το Optilis Ireks by Laoudis Foods λύνει ακριβώς αυτό:\n\n▸ Ελέγχει τη ζύμωση\n▸ Εξαλείφει φουσκαλάκια\n▸ Εγγυάται τραγανή κόρα.',
  instagram_save: 'Αποθήκευσε το post',
  instagram_cta: '🔗 Link in bio',
  instagram_hashtags: '#αρτοποιία #ψωμί #laoudisfoods',
  instagram_keywords: 'βελτιωτικό αρτοποιίας, αργή ζύμωση',
  linkedin_hook: 'Η αργή ζύμωση δεν είναι απλώς τάση. Είναι πρόκληση.',
  linkedin_body: 'Το 73% των αρτοποιείων αναφέρει αύξηση πωλήσεων με το σωστό improver. Το Optilis Ireks είναι η λύση.',
  linkedin_comment: 'Δουλεύετε με αργή ζύμωση;',
  linkedin_cta: 'Ακολουθήστε για περισσότερα',
  linkedin_hashtags: '#bakery #foodindustry',
  tiktok_hook: '"Γιατί το ψωμί σου δεν γίνεται ποτέ σωστό;"',
  tiktok_script: '1. HOOK: Κοντινό πλάνο\n2. PROBLEM: Τι πάει στραβά\n3. SOLUTION: Optilis Ireks\n4. CTA: Σχολίασε ΖΥΜΗ',
  tiktok_overlay: '"Το μυστικό?" → "0.5% στη ζύμη"',
  tiktok_hashtags: '#αρτοποιία #breadtok',
  imageUrl: 'https://image.pollinations.ai/prompt/professional%20artisan%20bread%20loaf?width=1024&height=1024',
  svgHeadline: 'Τέλεια Κόρα. Κάθε Φορά.',
  svgCta: 'ΜΑΘΕ ΠΕΡΙΣΣΟΤΕΡΑ'
};

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  const url = document.getElementById('productUrl').value.trim();
  const tone = document.getElementById('tone').value;
  const style = document.getElementById('style').value;
  const email = document.getElementById('email').value.trim();

  if (!topic || !tone || !style || !email) { alert('Συμπλήρωσε τα υποχρεωτικά πεδία.'); return; }

  document.querySelector('.card').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('generateBtn').disabled = true;

  const interval = setInterval(() => {
    const text = document.getElementById('loadingText');
    const randomIndex = Math.floor(Math.random() * LOADING_MSGS.length);
    text.textContent = LOADING_MSGS[randomIndex];
  }, 2000);

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ "Τίτλος Προϊόντος": topic, "Tone of Voice": tone, "Στυλ": style, "Αποστολή στο Email": email, "topic": topic, "productUrl": url })
    });
    
    if (!res.ok) throw new Error();
    const data = await res.json();
    clearInterval(interval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('generateBtn').disabled = false;
    renderResults(data);
  } catch (e) {
    clearInterval(interval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('demoBanner').style.display = 'block';
    renderResults(MOCK);
  }
}

function renderResults(d) {
  const container = document.getElementById('results');
  container.innerHTML = `
    <div class="platform-card" id="fb-card">
      <div class="platform-header" onclick="toggleCard('fb-body')">
        <div class="platform-label"><div class="platform-dot dot-fb"></div> 📘 Facebook</div>
        <span>▾</span>
      </div>
      <div class="platform-body" id="fb-body">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('fb','a')">A</div>
          <div class="tab" onclick="switchTab('fb','b')">B</div>
        </div>
        <div class="tab-pane active" id="fb-a">
          ${contentBlock('Τίτλος', d.facebook_a_title)} ${contentBlock('Hook', d.facebook_a_hook)} ${contentBlock('Body', d.facebook_a_body)} ${contentBlock('CTA', d.facebook_a_cta)}
        </div>
        <div class="tab-pane" id="fb-b">
          ${contentBlock('Τίτλος', d.facebook_b_title)} ${contentBlock('Hook', d.facebook_b_hook)} ${contentBlock('Body', d.facebook_b_body)} ${contentBlock('CTA', d.facebook_b_cta)}
        </div>
      </div>
    </div>
    
    <div class="platform-card">
        <div class="platform-header" onclick="toggleCard('ig-body')">
            <div class="platform-label"><div class="platform-dot dot-ig"></div> 📸 Instagram</div>
            <span>▾</span>
        </div>
        <div class="platform-body" id="ig-body">
            ${contentBlock('Hook', d.instagram_hook)} ${contentBlock('Caption', d.instagram_body)} ${contentBlock('CTA', d.instagram_cta)}
        </div>
    </div>

    <button class="btn-generate" onclick="location.reload()" style="background:transparent; border:1px solid var(--border)">← Νέο Generate</button>
  `;
  container.style.display = 'block';
}

function contentBlock(l, t) {
  if (!t) return '';
  const id = 'cb_' + Math.random().toString(36).substr(2,6);
  return `<div class="content-section"><div class="content-label">${l}</div><div class="content-text" id="${id}">${t}</div><button class="copy-btn" onclick="copyText('${id}', this)">Copy</button></div>`;
}

function copyText(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function toggleCard(id) {
  const el = document.getElementById(id);
  el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

function switchTab(p, t) {
  const card = document.getElementById(`${p}-card`);
  card.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  card.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`${p}-${t}`).classList.add('active');
}
</script>
</body>
</html>
